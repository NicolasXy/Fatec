<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar do Bootstrap -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="image/logo.png" width="40" class="me-2">
      Orem University
    </a>

    <!-- Botão para telas menores -->
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Área colapsável -->

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">

<main>

<!-- Container -->
<section class="container my-5">
  <h2 class="text-center mb-4">Contato</h2>

  <!-- Grid -->
  <div class="row g-4">

    <div class="col-md-6">
      <!-- Formulário -->
      <form>
        <input class="form-control mb-3" placeholder="Nome">
        <input class="form-control mb-3" placeholder="Email">
        <textarea class="form-control mb-3" rows="4" placeholder="Mensagem"></textarea>

        <!-- Botão -->
        <button class="btn btn-primary w-100">Enviar</button>
      </form>
    </div>

    <div class="col-md-6">
      <!-- Card -->
      <div class="card p-4 shadow">
        <h5>Informações</h5>
        <p>Email: contato@lorem.edu</p>
        <p>Telefone: (00) 0000-0000</p>
      </div>
    </div>

  </div>

  <div class="container text-center">
    <p class="mb-0">© 2026 Lorem University</p>
